on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Устанавливаем правильную версию Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. Устанавливаем Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Устанавливаем системные зависимости
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool texinfo \
            python3-pip python3-setuptools python3-dev build-essential patch openssl uuid-dev unzip \
            libsqlite3-dev xclip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev cmake

      # 4. Устанавливаем Buildozer и Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer wheel

      # 5. Запускаем сборку и автоматически принимаем лицензии через встроенную переменную
      - name: Build APK
        run: |
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_ANDROID_SDK_LICENSE: "1"

      # 6. Сохраняем готовый APK в артефакты
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: |
            bin/*.apk
            .buildozer/android/platform/build-android/*/*/*/*.apk
